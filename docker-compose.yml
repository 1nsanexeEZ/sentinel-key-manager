version: '3.8'

services:
  api:
    build: .
    container_name: sentinel_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sentinel_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentinel_password}
      - POSTGRES_DB=${POSTGRES_DB:-sentinel_db}
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_password}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_db}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - ${REDIS_PORT:-6379}:6379

volumes:
  pgdata: